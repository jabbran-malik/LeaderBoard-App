<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
      <link href="https://fonts.googleapis.com/css2?family=Poppins" rel="stylesheet">

    <!-- <link rel="stylesheet" href="./style.css"> -->
    <title>LeaderBoard App</title>
</head>
<body>
    <main>
 <header>
    <h1>LeaderBoard</h1>
 </header>
<!-- left side of Leaderboard -->
<div class="content">
 <section id="scoresection">
    <div class="scores-header">
        <h2>Recent Scores</h2>
        <button id="refresh-btn">Refresh</button>
    </div>
    <ul id="scores-list">
        <li>Ali: 100</li>
        <li>Azmat: 90</li>
        <li>Usman: 70</li>
    </ul>
 </section> 
<!-- left side of Leaderboard -->

<!-- right side of LeaderBoard -->
 <section class="addscores">
    <h2>Add Your Score</h2>
    <form id="score-form">
        <input type="text" placeholder="Your name" id="nameform" >
        <input type="number" placeholder="Your score" id="scoreform">
        <button type="submit" id="btn"> Submit</button>
    </form>
 </section>
</div>
 </main>
<!-- right side of LeaderBoard -->
 <!-- <script src="./index.js"></script> -->


</body>
</html>
